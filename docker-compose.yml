services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SAM2_MODEL_SIZE: ${SAM2_MODEL_SIZE:-base_plus}
    container_name: think2seg-backend
    ports:
      - "${BACKEND_PORT:-8123}:${API_PORT:-8123}"
    environment:
      - DEVICE=${DEVICE:-cuda}
      - DTYPE=${DTYPE:-bfloat16}
      - MODEL_DEVICE_MAP=${MODEL_DEVICE_MAP:-auto}
      - MODEL_NAME=${MODEL_NAME:-Think2Seg-RS-7B}
      - MODEL_PATH=${MODEL_PATH:-RicardoString/Think2Seg-RS-7B}
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8123}
      - FRONTEND_PORT=${FRONTEND_PORT:-3123}
      - VITE_PORT=${VITE_PORT:-5173}
      - DEBUG=${BACKEND_DEBUG:-false}
      - SAM2_MODEL_SIZE=${SAM2_MODEL_SIZE:-base_plus}
      - SAM2_DEVICE=${SAM2_DEVICE:-cuda}
      - SAM2_ROOT=${SAM2_ROOT:-/opt/sam2}
      - SAM2_CHECKPOINT=${SAM2_CHECKPOINT:-}
      - SAM2_CONFIG=${SAM2_CONFIG:-}
      - MAX_NEW_TOKENS=${MAX_NEW_TOKENS:-1024}
      - CLEAR_CUDA_CACHE_AFTER_RUN=${CLEAR_CUDA_CACHE_AFTER_RUN:-true}
      - ENABLE_TF32=${ENABLE_TF32:-true}
      - AETHER_MIN_COMPONENT_AREA=${AETHER_MIN_COMPONENT_AREA:-50}
      - AETHER_DEDUP_IOU_THRESHOLD=${AETHER_DEDUP_IOU_THRESHOLD:-0.55}
      - AETHER_DEDUP_CONTAINMENT_THRESHOLD=${AETHER_DEDUP_CONTAINMENT_THRESHOLD:-0.85}
      - AETHER_CLASSIFICATION_SMOOTHING=${AETHER_CLASSIFICATION_SMOOTHING:-0.01}
      - ULTRA_SIM_CALLBACK_BASE_URL=${ULTRA_SIM_CALLBACK_BASE_URL:-}
      - ULTRA_SIM_CALLBACK_TOKEN=${ULTRA_SIM_CALLBACK_TOKEN:-}
    volumes:
      - ./backend:/app
      - model_cache:/app/.model_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - isr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('API_PORT', '8123'); urllib.request.urlopen(f'http://localhost:{port}/health')"]
      interval: 30s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: isr-frontend
    ports:
      - "${FRONTEND_PORT:-3123}:80"
    depends_on:
      - backend
    networks:
      - isr-network
    environment:
      - API_PORT=${API_PORT:-8123}
      - NGINX_ENVSUBST_FILTER=^API_PORT$

volumes:
  model_cache:
    driver: local

networks:
  isr-network:
    driver: bridge
